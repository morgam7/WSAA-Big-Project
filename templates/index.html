<!DOCTYPE html>
<html>
<head>
    <title>Lichen Tracker</title>
</head>
<body>
   
    <h1>Lichen Tracker</h1>

    <h2>Add a New Lichen</h2>

    <form method="POST" action="/lichens">
        <label for="name">Lichen Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="description">Description:</label><br>
        <textarea id="description" name="description"></textarea><br><br>

        <button type="submit">Add Lichen</button>
    </form>

</body>
</html>
